server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript image/svg+xml application/json;

    location / {
        try_files $uri $uri/ =404;
    }

    # Long cache for static assets (video, images, css, js, fonts).
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|mp4|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
